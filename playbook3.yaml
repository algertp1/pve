---
- name: Configure Veeam Hardened Repository (RAID 6 + XFS)
  hosts: xfsrepo1
  become: yes
  vars:
    repo_disks:
      - /dev/sdb
      - /dev/sdc
      - /dev/sdd
      - /dev/sde
      - /dev/sdf
      - /dev/sdg
    raid_device: "/dev/md0"
    mount_point: "/mnt/veeamrepo"
    veeam_user: "veeamrepo"

  tasks:
    - name: Ensure RAID and XFS utilities are installed
      apt:
        name:
          - mdadm
          - xfsprogs
        state: present
        update_cache: yes

    - name: Create veeamrepo user
      user:
        name: "{{ veeam_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Create RAID 6 array
      mdadm:
        name: "{{ raid_device }}"
        devices: "{{ repo_disks }}"
        level: 6
        state: present

    - name: Ensure mdadm.conf is updated for persistence
      # Use a shell redirect but force it so we capture the array info
      shell: "mdadm --detail --scan >> /etc/mdadm/mdadm.conf"
      register: mdadm_config
      changed_when: "'md0' not in mdadm_config.stdout"
      # This ensures we don't append the same line every time you run it

    - name: Update initramfs (Ubuntu 25.10)
      command: update-initramfs -u

    - name: Format the RAID array with XFS Reflink
      filesystem:
        fstype: xfs
        dev: "{{ raid_device }}"
        opts: "-m reflink=1,crc=1 -b size=4096"
        force: no

    - name: Create and mount repository
      mount:
        path: "{{ mount_point }}"
        src: "{{ raid_device }}"
        fstype: xfs
        opts: defaults,noatime
        state: mounted

    - name: Set strict permissions on mount point
      file:
        path: "{{ mount_point }}"
        state: directory
        owner: "{{ veeam_user }}"
        group: "{{ veeam_user }}"
        mode: '0700'
