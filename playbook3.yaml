---
- name: Configure Veeam Hardened Repository (RAID 6 + XFS)
  hosts: xfsrepo1
  become: yes
  vars:
    repo_disks:
      - /dev/sdb
      - /dev/sdc
      - /dev/sdd
      - /dev/sde
      - /dev/sdf
      - /dev/sdg
    raid_device: "/dev/md0"
    mount_point: "/mnt/veeamrepo"
    veeam_user: "veeamrepo"

  tasks:
    - name: Ensure RAID and XFS utilities are installed
      apt:
        name:
          - mdadm
          - xfsprogs
        state: present
        update_cache: yes

    - name: Create veeamrepo user
      user:
        name: "{{ veeam_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Create RAID 6 array (Manual Command)
      # This command only runs if /dev/md0 doesn't already exist
      shell: "mdadm --create --run --verbose {{ raid_device }} --level=6 --raid-devices=6 {{ repo_disks | join(' ') }}"
      args:
        creates: "{{ raid_device }}"

    - name: Check if md0 is already in mdadm.conf
      shell: "grep -q '{{ raid_device }}' /etc/mdadm/mdadm.conf"
      register: mdadm_check
      failed_when: false
      changed_when: false

    - name: Append md0 to existing mdadm.conf if missing
      shell: "mdadm --detail --scan --verbose {{ raid_device }} >> /etc/mdadm/mdadm.conf"
      when: mdadm_check.rc != 0

    - name: Update initramfs (Ubuntu 25.10)
      command: update-initramfs -u

    - name: Format the RAID array with XFS Reflink
      filesystem:
        fstype: xfs
        dev: "{{ raid_device }}"
        opts: "-m reflink=1,crc=1 -b size=4096"
        force: no

    - name: Create and mount repository
      mount:
        path: "{{ mount_point }}"
        src: "{{ raid_device }}"
        fstype: xfs
        opts: defaults,noatime
        state: mounted

    - name: Set strict permissions on mount point
      file:
        path: "{{ mount_point }}"
        state: directory
        owner: "{{ veeam_user }}"
        group: "{{ veeam_user }}"
        mode: '0700'
